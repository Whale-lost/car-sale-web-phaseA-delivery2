<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Registration - SpeedAuto Used Cars</title>
    <style>
        :root {
            --primary: #0B1A33;
            --primary-light: #132344;
            --accent: #3B82F6;
            --accent-hover: #2563EB;
            --accent-light: #EFF6FF;
            --accent-soft: #60A5FA;
            --text-dark: #0F172A;
            --text-medium: #334155;
            --text-light: #64748B;
            --text-muted: #94A3B8;
            --bg-page: #F1F5F9;
            --bg-white: #FFFFFF;
            --bg-card: #FFFFFF;
            --border: #CBD5E1;
            --border-focus: #3B82F6;
            --input-bg: #F8FAFC;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.1);
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --font-heading: 'Georgia', 'Times New Roman', serif;
            --font-body: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            --transition: 0.2s ease;
            --header-height: 64px;
            --nav-height: 48px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-page);
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(ellipse at 20% 30%, rgba(59, 130, 246, 0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 70%, rgba(96, 165, 250, 0.08) 0%, transparent 55%);
            background-attachment: fixed;
        }

        .site-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--primary);
            flex-shrink: 0;
        }

        .header-logo {
            width: 42px;
            height: 42px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #fff;
            font-weight: 700;
            box-shadow: 0 2px 10px rgba(59, 130, 246, 0.35);
        }

        .header-title {
            font-family: var(--font-heading);
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--primary);
            white-space: nowrap;
        }

        .header-title span {
            color: var(--accent);
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-outline-sm,
        .btn-accent-sm {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            font-family: var(--font-body);
        }

        .btn-outline-sm {
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--text-medium);
        }

        .btn-outline-sm:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-light);
        }

        .btn-accent-sm {
            border: 1.5px solid var(--accent);
            background: var(--accent);
            color: #fff;
        }

        .btn-accent-sm:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
        }

        .main-nav {
            background: var(--primary);
            padding: 0 24px;
            height: var(--nav-height);
            display: flex;
            align-items: center;
            position: sticky;
            top: var(--header-height);
            z-index: 99;
            box-shadow: var(--shadow-md);
        }

        .nav-list {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 4px;
            max-width: 1280px;
            margin: 0 auto;
            width: 100%;
        }

        .nav-list li a {
            display: block;
            padding: 10px 18px;
            color: #CBD5E1;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 6px;
            transition: var(--transition);
            white-space: nowrap;
        }

        .nav-list li a:hover,
        .nav-list li a.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }

        .nav-list li a.active {
            background: rgba(59, 130, 246, 0.3);
            font-weight: 600;
        }

        .nav-icon {
            margin-right: 6px;
            font-size: 0.85rem;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 40px 24px;
            max-width: 1280px;
            margin: 0 auto;
            width: 100%;
        }

        .form-container {
            width: 100%;
            max-width: 580px;
            animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-card {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: 40px 36px 36px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .form-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--accent), var(--accent-soft), var(--accent));
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
        }

        .form-card-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .form-icon-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--accent-light);
            margin: 0 auto 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: var(--accent);
        }

        .form-card-header h2 {
            font-family: var(--font-heading);
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 6px;
        }

        .form-card-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-label {
            display: block;
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--text-medium);
            margin-bottom: 6px;
        }

        .required-star {
            color: #DC2626;
            margin-left: 2px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            font-size: 1rem;
            color: var(--text-muted);
            pointer-events: none;
            transition: var(--transition);
            z-index: 1;
        }

        .form-input {
            width: 100%;
            padding: 13px 14px 13px 42px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            font-family: var(--font-body);
            background: var(--input-bg);
            color: var(--text-dark);
            transition: var(--transition);
            outline: none;
        }

        .form-input::placeholder {
            color: #94A3B8;
            font-size: 0.875rem;
        }

        .form-input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
            background: #fff;
        }

        .form-input:focus+.input-icon,
        .input-wrapper:focus-within .input-icon {
            color: var(--accent);
        }

        .form-input.input-error {
            border-color: #DC2626;
            box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.08);
            background: #FEF2F2;
        }

        .error-message {
            display: none;
            font-size: 0.78rem;
            color: #DC2626;
            margin-top: 5px;
            padding-left: 4px;
            align-items: center;
            gap: 4px;
            animation: shake 0.3s ease;
        }

        .error-message.visible {
            display: flex;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-4px);
            }

            40% {
                transform: translateX(4px);
            }

            60% {
                transform: translateX(-3px);
            }

            80% {
                transform: translateX(3px);
            }
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font-body);
            margin-top: 8px;
        }

        .btn-submit:hover {
            background: var(--accent-hover);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(0);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-submit:disabled {
            background: #94A3B8;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .login-link {
            text-align: center;
            margin-top: 22px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .login-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .login-link a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        .toast-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.5);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .toast-box {
            background: #fff;
            border-radius: var(--radius-lg);
            padding: 32px 28px 24px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            max-width: 380px;
            width: 90%;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.85) translateY(20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .toast-icon-success {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #DCFCE7;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: #16A34A;
        }

        .toast-box h3 {
            font-family: var(--font-heading);
            font-size: 1.25rem;
            margin-bottom: 6px;
            color: var(--primary);
        }

        .toast-box p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .btn-toast-close {
            padding: 10px 32px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .btn-toast-close:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
        }

        @media (max-width: 900px) {
            .main-nav {
                overflow-x: auto;
                padding: 0 8px;
            }

            .nav-list {
                flex-wrap: nowrap;
                gap: 0;
            }

            .nav-list li a {
                padding: 10px 12px;
                font-size: 0.82rem;
            }

            .header-title {
                font-size: 1.15rem;
            }

            .header-logo {
                width: 36px;
                height: 36px;
                font-size: 18px;
            }

            .btn-outline-sm,
            .btn-accent-sm {
                padding: 6px 12px;
                font-size: 0.78rem;
            }

            .site-header {
                --header-height: 56px;
                padding: 0 14px;
            }

            .main-nav {
                --nav-height: 42px;
                top: 56px;
            }
        }

        @media (max-width: 600px) {
            .main-content {
                padding: 24px 14px;
            }

            .form-card {
                padding: 28px 18px 24px;
                border-radius: var(--radius-lg);
            }

            .form-card::before {
                border-radius: var(--radius-lg) var(--radius-lg) 0 0;
                height: 4px;
            }

            .form-card-header h2 {
                font-size: 1.35rem;
            }

            .form-icon-circle {
                width: 48px;
                height: 48px;
                font-size: 22px;
            }

            .form-input {
                padding: 12px 12px 12px 38px;
                font-size: 0.9rem;
            }

            .input-icon {
                left: 12px;
                font-size: 0.9rem;
            }

            .btn-submit {
                padding: 12px;
                font-size: 0.95rem;
            }

            .header-actions .btn-outline-sm {
                display: none;
            }
        }
    </style>
</head>

<body>
    <header class="site-header">
        <a href="home.html" class="header-brand" title="SpeedAuto Used Cars - Home">
            <div class="header-logo">🚗</div>
            <span class="header-title">Speed<span>Auto</span></span>
        </a>
        <div class="header-actions">
            <a href="search.html" class="btn-outline-sm">🔍 Browse Cars</a>
            <a href="registration.html" class="btn-accent-sm">✏️ Register</a>
        </div>
    </header>
    <nav class="main-nav">
        <ul class="nav-list">
            <li><a href="home.html"><span class="nav-icon">🏠</span>Home</a></li>
            <li><a href="search.html"><span class="nav-icon">🚙</span>Inventory</a></li>
            <li><a href="addcar.html"><span class="nav-icon">➕</span>Add Car</a></li>
            <li><a href="login.html"><span class="nav-icon">🔐</span>Seller Login</a></li>
            <li><a href="registration.html" class="active"><span class="nav-icon">📝</span>Register</a></li>
        </ul>
    </nav>
    <main class="main-content">
        <div class="form-container">
            <div class="form-card">
                <div class="form-card-header">
                    <div class="form-icon-circle">📋</div>
                    <h2>Seller Registration</h2>
                    <p>Create your account to start selling cars</p>
                </div>
                <form id="registrationForm" novalidate autocomplete="off">
                    <!-- 姓名 -->
                    <div class="form-group">
                        <label class="form-label" for="fullname">Full Name<span class="required-star">*</span></label>
                        <div class="input-wrapper">
                            <span class="input-icon">👤</span>
                            <input type="text" id="fullname" class="form-input" placeholder="e.g. John Smith"
                                maxlength="60">
                        </div>
                        <span class="error-message" id="fullnameError"><span class="error-icon">⚠️</span><span
                                class="error-text"></span></span>
                    </div>
                    <!-- 地址 -->
                    <div class="form-group">
                        <label class="form-label" for="address">Address<span class="required-star">*</span></label>
                        <div class="input-wrapper">
                            <span class="input-icon">📍</span>
                            <input type="text" id="address" class="form-input" placeholder="e.g. 123 Main St"
                                maxlength="100">
                        </div>
                        <span class="error-message" id="addressError"><span class="error-icon">⚠️</span><span
                                class="error-text"></span></span>
                    </div>
                    <!-- 手机号 -->
                    <div class="form-group">
                        <label class="form-label" for="phone">Phone (China)<span class="required-star">*</span></label>
                        <div class="input-wrapper">
                            <span class="input-icon">📱</span>
                            <input type="tel" id="phone" class="form-input" placeholder="e.g. 13800138000"
                                maxlength="11">
                        </div>
                        <span class="error-message" id="phoneError"><span class="error-icon">⚠️</span><span
                                class="error-text"></span></span>
                    </div>
                    <!-- 电子邮件 -->
                    <div class="form-group">
                        <label class="form-label" for="email">Email<span class="required-star">*</span></label>
                        <div class="input-wrapper">
                            <span class="input-icon">✉️</span>
                            <input type="email" id="email" class="form-input" placeholder="e.g. seller@example.com"
                                maxlength="80">
                        </div>
                        <span class="error-message" id="emailError"><span class="error-icon">⚠️</span><span
                                class="error-text"></span></span>
                    </div>
                    <!-- 用户名 -->
                    <div class="form-group">
                        <label class="form-label" for="username">Username<span class="required-star">*</span></label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔑</span>
                            <input type="text" id="username" class="form-input"
                                placeholder="At least 6 letters or digits" maxlength="30">
                        </div>
                        <span class="error-message" id="usernameError"><span class="error-icon">⚠️</span><span
                                class="error-text"></span></span>
                    </div>
                    <!-- 密码 -->
                    <div class="form-group">
                        <label class="form-label" for="password">Password<span class="required-star">*</span></label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="password" class="form-input"
                                placeholder="At least 6 letters or digits" maxlength="30">
                        </div>
                        <span class="error-message" id="passwordError"><span class="error-icon">⚠️</span><span
                                class="error-text"></span></span>
                    </div>
                    <button type="submit" class="btn-submit" id="submitBtn">Create Account</button>
                </form>
                <div class="login-link">
                    Already have an account? <a href="login.html">Log in here</a>
                </div>
            </div>
        </div>
    </main>
    <div id="toastContainer" style="display:none;"></div>
    <script>
        (function () {
            const form = document.getElementById('registrationForm');
            const submitBtn = document.getElementById('submitBtn');
            const toastContainer = document.getElementById('toastContainer');

            // 字段与对应错误元素
            const fields = {
                fullname: { el: document.getElementById('fullname'), err: document.getElementById('fullnameError') },
                address: { el: document.getElementById('address'), err: document.getElementById('addressError') },
                phone: { el: document.getElementById('phone'), err: document.getElementById('phoneError') },
                email: { el: document.getElementById('email'), err: document.getElementById('emailError') },
                username: { el: document.getElementById('username'), err: document.getElementById('usernameError') },
                password: { el: document.getElementById('password'), err: document.getElementById('passwordError') }
            };

            // 验证正则
            const patterns = {
                fullname: /^[a-zA-Z\s]+$/,
                address: /^[a-zA-Z0-9\s]+$/,
                phone: /^1[3-9]\d{9}$/,
                email: /^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.(cn|com)$/i,
                username: /^[a-zA-Z0-9]{6,}$/,
                password: /^[a-zA-Z0-9]{6,}$/
            };

            function showError(fieldId, msg) {
                const errEl = fields[fieldId].err;
                errEl.querySelector('.error-text').textContent = msg;
                errEl.classList.add('visible');
                fields[fieldId].el.classList.add('input-error');
            }

            function clearError(fieldId) {
                const errEl = fields[fieldId].err;
                errEl.classList.remove('visible');
                fields[fieldId].el.classList.remove('input-error');
            }

            function clearAllErrors() {
                Object.keys(fields).forEach(id => clearError(id));
            }

            // 实时清除错误（输入或聚焦时）
            Object.keys(fields).forEach(id => {
                const input = fields[id].el;
                input.addEventListener('input', function () {
                    if (fields[id].err.classList.contains('visible')) {
                        // 如果当前值通过验证则清除
                        const val = this.value.trim();
                        let valid = false;
                        if (id === 'fullname' || id === 'address') {
                            valid = patterns[id].test(val) && val.length > 0;
                        } else if (id === 'phone') {
                            valid = patterns.phone.test(val);
                        } else if (id === 'email') {
                            valid = patterns.email.test(val);
                        } else if (id === 'username' || id === 'password') {
                            valid = patterns[id].test(val);
                        }
                        if (valid) clearError(id);
                    }
                });
                input.addEventListener('focus', function () {
                    if (fields[id].err.classList.contains('visible')) clearError(id);
                });
            });

            function validateForm() {
                let isValid = true;

                // 姓名
                const fullname = fields.fullname.el.value.trim();
                if (!fullname) {
                    showError('fullname', 'Full name is required.');
                    isValid = false;
                } else if (!patterns.fullname.test(fullname)) {
                    showError('fullname', 'Only letters and spaces allowed.');
                    isValid = false;
                } else clearError('fullname');

                // 地址
                const address = fields.address.el.value.trim();
                if (!address) {
                    showError('address', 'Address is required.');
                    isValid = false;
                } else if (!patterns.address.test(address)) {
                    showError('address', 'Only letters, numbers and spaces allowed.');
                    isValid = false;
                } else clearError('address');

                // 手机号
                const phone = fields.phone.el.value.trim();
                if (!phone) {
                    showError('phone', 'Phone number is required.');
                    isValid = false;
                } else if (!patterns.phone.test(phone)) {
                    showError('phone', 'Invalid Chinese phone number. Must be 11 digits starting with 1[3-9].');
                    isValid = false;
                } else clearError('phone');

                // 电子邮件
                const email = fields.email.el.value.trim();
                if (!email) {
                    showError('email', 'Email is required.');
                    isValid = false;
                } else if (!patterns.email.test(email)) {
                    showError('email', 'Email must end with .cn or .com and contain exactly one @.');
                    isValid = false;
                } else clearError('email');

                // 用户名
                const username = fields.username.el.value.trim();
                if (!username) {
                    showError('username', 'Username is required.');
                    isValid = false;
                } else if (!patterns.username.test(username)) {
                    showError('username', 'Username must be at least 6 letters or digits.');
                    isValid = false;
                } else clearError('username');

                // 密码
                const password = fields.password.el.value.trim();
                if (!password) {
                    showError('password', 'Password is required.');
                    isValid = false;
                } else if (!patterns.password.test(password)) {
                    showError('password', 'Password must be at least 6 letters or digits.');
                    isValid = false;
                } else clearError('password');

                return isValid;
            }

            function showSuccessToast() {
                const html = `
                    <div class="toast-overlay" id="toastOverlay">
                        <div class="toast-box">
                            <div class="toast-icon-success">✅</div>
                            <h3>Registration Submitted</h3>
                            <p>Demo mode: your information has been recorded.<br>No real server request was made.</p>
                            <button class="btn-toast-close" id="btnClose">OK</button>
                        </div>
                    </div>`;
                toastContainer.innerHTML = html;
                toastContainer.style.display = 'block';
                const overlay = document.getElementById('toastOverlay');
                const closeBtn = document.getElementById('btnClose');
                const close = () => { toastContainer.innerHTML = ''; toastContainer.style.display = 'none'; };
                closeBtn.addEventListener('click', close);
                overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
                document.addEventListener('keydown', function esc(e) {
                    if (e.key === 'Escape') { close(); document.removeEventListener('keydown', esc); }
                });
            }

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                clearAllErrors();
                if (validateForm()) {
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Submitting...';
                    setTimeout(() => {
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Create Account';
                        showSuccessToast();
                    }, 400);
                } else {
                    // 聚焦第一个错误字段
                    const firstError = document.querySelector('.input-error');
                    if (firstError) firstError.focus();
                }
            });

            console.log('SpeedAuto seller registration page ready (demo mode)');
        })();
    </script>
</body>

</html>
