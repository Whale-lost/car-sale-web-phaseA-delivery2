<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Cars - SpeedAuto Used Cars</title>
    <style>
        :root {
            --primary: #0B1A33;
            --primary-light: #132344;
            --accent: #3B82F6;
            --accent-hover: #2563EB;
            --accent-light: #EFF6FF;
            --accent-soft: #60A5FA;
            --text-dark: #0F172A;
            --text-medium: #334155;
            --text-light: #64748B;
            --text-muted: #94A3B8;
            --bg-page: #F1F5F9;
            --bg-white: #FFFFFF;
            --bg-card: #FFFFFF;
            --border: #CBD5E1;
            --border-focus: #3B82F6;
            --input-bg: #F8FAFC;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.1);
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --font-heading: 'Georgia', 'Times New Roman', serif;
            --font-body: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            --transition: 0.2s ease;
            --header-height: 64px;
            --nav-height: 48px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-page);
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(ellipse at 20% 30%, rgba(59, 130, 246, 0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 70%, rgba(96, 165, 250, 0.08) 0%, transparent 55%);
            background-attachment: fixed;
        }

        .site-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--primary);
            flex-shrink: 0;
        }

        .header-logo {
            width: 42px;
            height: 42px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #fff;
            font-weight: 700;
            box-shadow: 0 2px 10px rgba(59, 130, 246, 0.35);
        }

        .header-title {
            font-family: var(--font-heading);
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--primary);
            white-space: nowrap;
        }

        .header-title span {
            color: var(--accent);
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-outline-sm,
        .btn-accent-sm {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            font-family: var(--font-body);
        }

        .btn-outline-sm {
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--text-medium);
        }

        .btn-outline-sm:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-light);
        }

        .btn-accent-sm {
            border: 1.5px solid var(--accent);
            background: var(--accent);
            color: #fff;
        }

        .btn-accent-sm:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
        }

        .main-nav {
            background: var(--primary);
            padding: 0 24px;
            height: var(--nav-height);
            display: flex;
            align-items: center;
            position: sticky;
            top: var(--header-height);
            z-index: 99;
            box-shadow: var(--shadow-md);
        }

        .nav-list {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 4px;
            max-width: 1280px;
            margin: 0 auto;
            width: 100%;
        }

        .nav-list li a {
            display: block;
            padding: 10px 18px;
            color: #CBD5E1;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 6px;
            transition: var(--transition);
            white-space: nowrap;
        }

        .nav-list li a:hover,
        .nav-list li a.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }

        .nav-list li a.active {
            background: rgba(59, 130, 246, 0.3);
            font-weight: 600;
        }

        .nav-icon {
            margin-right: 6px;
            font-size: 0.85rem;
        }

        .main-content {
            flex: 1;
            padding: 32px 24px;
            max-width: 1280px;
            margin: 0 auto;
            width: 100%;
        }

        .search-section {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-md);
            margin-bottom: 32px;
            border: 1px solid var(--border);
        }

        .search-form {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 16px;
        }

        .search-field {
            flex: 1 1 200px;
        }

        .search-field label {
            display: block;
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--text-medium);
            margin-bottom: 6px;
        }

        .search-input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            background: var(--input-bg);
            transition: var(--transition);
            outline: none;
            font-family: var(--font-body);
        }

        .search-input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            background: #fff;
        }

        .btn-search {
            padding: 11px 28px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font-body);
            white-space: nowrap;
            height: 44px;
        }

        .btn-search:hover {
            background: var(--accent-hover);
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
        }

        .results-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .result-placeholder {
            grid-column: 1 / -1;
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
            font-size: 1rem;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px dashed var(--border);
        }

        .car-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
        }

        .car-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--accent-soft);
        }

        .car-card.active {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        .car-card-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #f0f4ff;
        }

        .car-card-body {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .car-model {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
            line-height: 1.3;
        }

        .car-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .car-price {
            font-weight: 700;
            color: var(--accent);
            font-size: 1.2rem;
        }

        .detail-section {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 28px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .detail-section.visible {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .detail-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
        }

        .detail-image {
            flex: 1 1 280px;
            max-width: 350px;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .detail-image img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
            aspect-ratio: 4/3;
            background: #f0f4ff;
        }

        .detail-info {
            flex: 2 1 300px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .detail-info h3 {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            color: var(--primary);
        }

        .info-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 24px;
        }

        .info-item {
            display: flex;
            align-items: baseline;
            gap: 6px;
            font-size: 0.95rem;
        }

        .info-label {
            font-weight: 600;
            color: var(--text-medium);
            min-width: 60px;
        }

        .info-value {
            color: var(--text-dark);
            font-weight: 500;
        }

        .price-highlight {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
        }

        @media (max-width: 900px) {
            .main-nav {
                overflow-x: auto;
                padding: 0 8px;
            }

            .nav-list {
                flex-wrap: nowrap;
                gap: 0;
            }

            .nav-list li a {
                padding: 10px 12px;
                font-size: 0.82rem;
            }

            .header-title {
                font-size: 1.15rem;
            }

            .header-logo {
                width: 36px;
                height: 36px;
                font-size: 18px;
            }

            .btn-outline-sm,
            .btn-accent-sm {
                padding: 6px 12px;
                font-size: 0.78rem;
            }

            .site-header {
                --header-height: 56px;
                padding: 0 14px;
            }

            .main-nav {
                --nav-height: 42px;
                top: 56px;
            }
        }

        @media (max-width: 600px) {
            .main-content {
                padding: 20px 14px;
            }

            .search-form {
                flex-direction: column;
            }

            .btn-search {
                width: 100%;
            }

            .results-container {
                grid-template-columns: 1fr;
            }

            .detail-grid {
                flex-direction: column;
            }

            .detail-image {
                max-width: 100%;
            }

            .header-actions .btn-outline-sm {
                display: none;
            }
        }
    </style>
</head>

<body>
    <header class="site-header">
        <a href="home.html" class="header-brand" title="SpeedAuto Used Cars - Home">
            <div class="header-logo">🚗</div>
            <span class="header-title">Speed<span>Auto</span></span>
        </a>
        <div class="header-actions">
            <a href="search.html" class="btn-outline-sm">🔍 Browse Cars</a>
            <a href="registration.html" class="btn-accent-sm">✏️ Register</a>
        </div>
    </header>
    <nav class="main-nav">
        <ul class="nav-list">
            <li><a href="home.html"><span class="nav-icon">🏠</span>Home</a></li>
            <li><a href="search.html" class="active"><span class="nav-icon">🚙</span>Inventory</a></li>
            <li><a href="addcar.html"><span class="nav-icon">➕</span>Add Car</a></li>
            <li><a href="login.html"><span class="nav-icon">🔐</span>Seller Login</a></li>
            <li><a href="registration.html"><span class="nav-icon">📝</span>Register</a></li>
        </ul>
    </nav>
    <main class="main-content">
        <section class="search-section">
            <form id="searchForm" autocomplete="off" novalidate>
                <div class="search-form">
                    <div class="search-field">
                        <label for="modelInput">Model</label>
                        <input type="text" id="modelInput" class="search-input" placeholder="e.g. Civic, Camry">
                    </div>
                    <div class="search-field">
                        <label for="yearInput">Year</label>
                        <input type="number" id="yearInput" class="search-input" placeholder="e.g. 2022" min="1900"
                            max="2026">
                    </div>
                    <button type="submit" class="btn-search" id="searchBtn">🔍 Search</button>
                </div>
            </form>
        </section>
        <div id="resultsContainer" class="results-container">
            <div class="result-placeholder">🔎 Enter model and/or year to search for cars.</div>
        </div>
        <section id="detailSection" class="detail-section"></section>
    </main>
    <script>
        (function () {
            // 硬编码示例数据集
            const cars = [
                { model: 'Honda Civic', year: 2022, color: 'Pearl White', location: 'Los Angeles, CA', price: 22500, imageUrl: 'https://picsum.photos/seed/civic/400/300' },
                { model: 'Toyota Camry', year: 2021, color: 'Silver', location: 'San Francisco, CA', price: 19800, imageUrl: 'https://picsum.photos/seed/camry/400/300' },
                { model: 'Tesla Model 3', year: 2023, color: 'Deep Blue', location: 'Austin, TX', price: 35200, imageUrl: 'https://picsum.photos/seed/tesla3/400/300' },
                { model: 'Ford Mustang', year: 2020, color: 'Race Red', location: 'Miami, FL', price: 28500, imageUrl: 'https://picsum.photos/seed/mustang/400/300' },
                { model: 'Chevrolet Malibu', year: 2022, color: 'Black', location: 'Chicago, IL', price: 21300, imageUrl: 'https://picsum.photos/seed/malibu/400/300' },
                { model: 'BMW 3 Series', year: 2023, color: 'Mineral Gray', location: 'New York, NY', price: 41900, imageUrl: 'https://picsum.photos/seed/bmw3/400/300' },
                { model: 'Hyundai Tucson', year: 2022, color: 'Phantom Black', location: 'Denver, CO', price: 24700, imageUrl: 'https://picsum.photos/seed/tucson/400/300' }
            ];

            const searchForm = document.getElementById('searchForm');
            const modelInput = document.getElementById('modelInput');
            const yearInput = document.getElementById('yearInput');
            const resultsContainer = document.getElementById('resultsContainer');
            const detailSection = document.getElementById('detailSection');

            let activeIndex = -1;

            function renderResults(filteredCars) {
                resultsContainer.innerHTML = '';
                if (filteredCars.length === 0) {
                    resultsContainer.innerHTML = '<div class="result-placeholder">😕 No cars matching your criteria.</div>';
                    return;
                }
                filteredCars.forEach((car, index) => {
                    const card = document.createElement('div');
                    card.className = 'car-card';
                    card.dataset.index = index;
                    card.innerHTML = `
                        <img class="car-card-image" src="${car.imageUrl}" alt="${car.model}" loading="lazy">
                        <div class="car-card-body">
                            <div class="car-model">${car.model}</div>
                            <div class="car-meta">
                                <span>📅 ${car.year}</span>
                                <span class="car-price">$${car.price.toLocaleString()}</span>
                            </div>
                        </div>
                    `;
                    card.addEventListener('click', () => {
                        setActiveCard(card, car, index);
                    });
                    resultsContainer.appendChild(card);
                });
            }

            function setActiveCard(cardElement, car, index) {
                // 移除所有高亮
                document.querySelectorAll('.car-card').forEach(c => c.classList.remove('active'));
                // 高亮当前
                cardElement.classList.add('active');
                activeIndex = index;
                showDetail(car);
            }

            function showDetail(car) {
                detailSection.classList.add('visible');
                detailSection.innerHTML = `
                    <div class="detail-grid">
                        <div class="detail-image">
                            <img src="${car.imageUrl}" alt="${car.model}">
                        </div>
                        <div class="detail-info">
                            <h3>${car.model}</h3>
                            <div class="info-row">
                                <div class="info-item"><span class="info-label">Color:</span><span class="info-value">${car.color}</span></div>
                                <div class="info-item"><span class="info-label">Year:</span><span class="info-value">${car.year}</span></div>
                                <div class="info-item"><span class="info-label">Location:</span><span class="info-value">${car.location}</span></div>
                            </div>
                            <div class="price-highlight">$${car.price.toLocaleString()}</div>
                        </div>
                    </div>
                `;
                detailSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            function clearDetailAndActive() {
                detailSection.classList.remove('visible');
                detailSection.innerHTML = '';
                document.querySelectorAll('.car-card').forEach(c => c.classList.remove('active'));
                activeIndex = -1;
            }

            function performSearch() {
                const modelQuery = modelInput.value.trim().toLowerCase();
                const yearQuery = yearInput.value.trim();

                // 如果两个输入都为空，显示初始提示
                if (!modelQuery && !yearQuery) {
                    resultsContainer.innerHTML = '<div class="result-placeholder">🔎 Enter model and/or year to search for cars.</div>';
                    clearDetailAndActive();
                    return;
                }

                const yearNum = yearQuery ? parseInt(yearQuery, 10) : null;
                const filtered = cars.filter(car => {
                    let modelMatch = true;
                    let yearMatch = true;
                    if (modelQuery) {
                        modelMatch = car.model.toLowerCase().includes(modelQuery);
                    }
                    if (yearNum !== null && !isNaN(yearNum)) {
                        yearMatch = car.year === yearNum;
                    }
                    return modelMatch && yearMatch;
                });

                clearDetailAndActive();
                renderResults(filtered);
            }

            searchForm.addEventListener('submit', function (e) {
                e.preventDefault();
                performSearch();
            });

            // 可选：输入框回车触发搜索
            modelInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') { e.preventDefault(); performSearch(); }
            });
            yearInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') { e.preventDefault(); performSearch(); }
            });

            console.log('SpeedAuto search page ready (demo mode)');
        })();
    </script>
</body>

</html>
